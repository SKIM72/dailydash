<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyDash - 로그인</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DailyDash">
    <link rel="apple-touch-icon" href="icon.jpeg">
    
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body-wrapper">

    <div class="login-card">
        <img src="icon.jpeg" alt="DailyDash 로고" class="login-logo">
        
        <div id="login-view">
            <h2>DailyDash 로그인</h2>
            <p class="login-subtitle">가게 정산 시스템 접속을 위해 인증해 주세요.</p>
            
            <form id="loginForm">
                <div class="form-group" style="text-align: left;">
                    <label for="loginEmail"><i class="far fa-envelope"></i> 이메일 주소</label>
                    <input type="email" id="loginEmail" placeholder="example@email.com" required>
                </div>
                
                <div class="form-group" style="text-align: left; margin-bottom: 12px;">
                    <label for="loginPassword"><i class="fas fa-lock"></i> 비밀번호</label>
                    <div class="password-input-wrap">
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('loginPassword', this)"></i>
                    </div>
                </div>

                <div class="auth-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberEmail"> 아이디 저장
                    </label>
                    <a class="text-link" onclick="toggleView('reset')">비밀번호 찾기</a>
                </div>
                
                <button type="submit" class="btn-submit" id="loginBtn" style="margin-bottom: 20px;">
                    <i class="fas fa-sign-in-alt"></i> 로그인하기
                </button>
            </form>
            <div style="font-size: 0.9rem; color: var(--text-muted);">
                아직 계정이 없으신가요? <a class="text-link" onclick="toggleView('signup')">회원가입</a>
            </div>
        </div>

        <div id="signup-view" class="hidden-view">
            <h2>관리자 회원가입</h2>
            <p class="login-subtitle">새로운 DailyDash 계정을 생성합니다.</p>
            
            <form id="signupForm">
                <div class="form-group" style="text-align: left;">
                    <label for="signupEmail"><i class="far fa-envelope"></i> 사용할 이메일</label>
                    <input type="email" id="signupEmail" placeholder="example@email.com" required>
                </div>
                
                <div class="form-group" style="text-align: left;">
                    <label for="signupPassword"><i class="fas fa-lock"></i> 비밀번호 (6자 이상)</label>
                    <div class="password-input-wrap">
                        <input type="password" id="signupPassword" placeholder="••••••••" required minlength="6">
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('signupPassword', this)"></i>
                    </div>
                </div>

                <div class="form-group" style="text-align: left; margin-bottom: 24px;">
                    <label for="signupConfirmPassword"><i class="fas fa-check-circle"></i> 비밀번호 확인</label>
                    <div class="password-input-wrap">
                        <input type="password" id="signupConfirmPassword" placeholder="••••••••" required minlength="6">
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('signupConfirmPassword', this)"></i>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit" id="signupBtn" style="margin-bottom: 20px;">
                    <i class="fas fa-user-plus"></i> 가입하기
                </button>
            </form>
            <div style="font-size: 0.9rem; color: var(--text-muted);">
                이미 계정이 있으신가요? <a class="text-link" onclick="toggleView('login')">로그인으로 돌아가기</a>
            </div>
        </div>

        <div id="reset-view" class="hidden-view">
            <h2>비밀번호 찾기</h2>
            <p class="login-subtitle">가입하신 이메일로 비밀번호 재설정 링크를 보내드립니다.</p>
            
            <form id="resetForm">
                <div class="form-group" style="text-align: left; margin-bottom: 24px;">
                    <label for="resetEmail"><i class="far fa-envelope"></i> 가입한 이메일 주소</label>
                    <input type="email" id="resetEmail" placeholder="example@email.com" required>
                </div>
                
                <button type="submit" class="btn-submit" id="resetBtn" style="margin-bottom: 20px;">
                    <i class="fas fa-paper-plane"></i> 재설정 링크 발송
                </button>
            </form>
            <div style="font-size: 0.9rem; color: var(--text-muted);">
                <a class="text-link" onclick="toggleView('login')"><i class="fas fa-arrow-left"></i> 로그인으로 돌아가기</a>
            </div>
        </div>

        <div id="update-password-view" class="hidden-view">
            <h2>새 비밀번호 설정</h2>
            <p class="login-subtitle">새롭게 사용할 비밀번호를 입력해 주세요.</p>
            
            <form id="updatePasswordForm">
                <div class="form-group" style="text-align: left; margin-bottom: 24px;">
                    <label for="newPassword"><i class="fas fa-lock"></i> 새 비밀번호</label>
                    <div class="password-input-wrap">
                        <input type="password" id="newPassword" placeholder="••••••••" required minlength="6">
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('newPassword', this)"></i>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit" id="updatePwdBtn" style="background: var(--secondary); margin-bottom: 20px;">
                    <i class="fas fa-save"></i> 비밀번호 변경하기
                </button>
            </form>
        </div>
    </div>

    <div id="custom-alert-modal" class="modal-overlay hidden-view" style="z-index: 99999;">
        <div class="custom-modal-card">
            <i class="fas fa-info-circle" style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;"></i>
            <h3 id="alert-message" style="margin-bottom: 1.5rem; font-size: 1.05rem; font-weight: 600; line-height: 1.5; color: var(--text-main); word-break: keep-all;"></h3>
            <button id="alert-ok-btn" class="btn-submit" style="margin-top: 0;">확인</button>
        </div>
    </div>

    <div id="custom-confirm-modal" class="modal-overlay hidden-view" style="z-index: 99999;">
        <div class="custom-modal-card">
            <i class="fas fa-exclamation-circle" style="font-size: 3rem; color: var(--danger); margin-bottom: 1rem;"></i>
            <h3 id="confirm-message" style="margin-bottom: 1.5rem; font-size: 1.05rem; font-weight: 600; line-height: 1.5; color: var(--text-main); word-break: keep-all;"></h3>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button id="confirm-no-btn" class="btn-secondary" style="flex: 1; margin: 0; background: var(--main-bg); color: var(--text-muted); border: 1px solid var(--border);">취소</button>
                <button id="confirm-yes-btn" class="btn-danger" style="flex: 1; margin: 0; font-size: 1.05rem; padding: 12px; border-radius: 8px;">확인</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        function toggleView(viewName) {
            document.getElementById('login-view').classList.add('hidden-view');
            document.getElementById('signup-view').classList.add('hidden-view');
            document.getElementById('reset-view').classList.add('hidden-view');
            document.getElementById('update-password-view').classList.add('hidden-view');
            document.getElementById(viewName + '-view').classList.remove('hidden-view');
        }

        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text'; 
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash'); 
            } else {
                input.type = 'password'; 
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye'); 
            }
        }
    </script>
    <script src="auth.js"></script>
</body>
</html>
